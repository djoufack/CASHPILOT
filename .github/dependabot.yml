version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Brussels
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"
    ignore:
      - dependency-name: "react-signature-canvas"
        versions:
          - ">=2.0.0"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Europe/Brussels
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore(deps)
      include: scope
