name: Quality Guards

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guards
        run: npm run guard

      - name: Run tests
        run: npm test
