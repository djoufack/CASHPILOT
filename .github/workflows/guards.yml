name: Quality Guards

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required env vars
        run: |
          missing=0
          for var in VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            if [ -z "${!var}" ]; then
              echo "::warning::Required env var $var is not set"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::warning::Some required env vars are missing. Build may fail at runtime."
          fi
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run guards
        run: npm run guard

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm test

  remote-reliability:
    needs: guards
    if: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.PILOTAGE_FR_PASSWORD != '' && secrets.PILOTAGE_BE_PASSWORD != '' && secrets.PILOTAGE_OHADA_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run remote reliability checks
        run: npm run verify:reliability
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PILOTAGE_FR_PASSWORD: ${{ secrets.PILOTAGE_FR_PASSWORD }}
          PILOTAGE_BE_PASSWORD: ${{ secrets.PILOTAGE_BE_PASSWORD }}
          PILOTAGE_OHADA_PASSWORD: ${{ secrets.PILOTAGE_OHADA_PASSWORD }}

  remote-accounting-compliance:
    needs: guards
    if: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.PILOTAGE_FR_PASSWORD != '' && secrets.PILOTAGE_BE_PASSWORD != '' && secrets.PILOTAGE_OHADA_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run accounting company-scope checks
        run: npm run verify:accounting-company-scope
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PILOTAGE_FR_PASSWORD: ${{ secrets.PILOTAGE_FR_PASSWORD }}
          PILOTAGE_BE_PASSWORD: ${{ secrets.PILOTAGE_BE_PASSWORD }}
          PILOTAGE_OHADA_PASSWORD: ${{ secrets.PILOTAGE_OHADA_PASSWORD }}

  remote-demo-thresholds:
    needs: guards
    if: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run demo thresholds gate
        run: npm run verify:demo-thresholds
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  remote-smoke-ui:
    needs:
      - guards
      - remote-reliability
      - remote-accounting-compliance
      - remote-demo-thresholds
    if: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.PILOTAGE_FR_PASSWORD != '' && secrets.PILOTAGE_BE_PASSWORD != '' && secrets.PILOTAGE_OHADA_PASSWORD != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke UI
        run: npm run verify:smoke-ui
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PILOTAGE_FR_PASSWORD: ${{ secrets.PILOTAGE_FR_PASSWORD }}
          PILOTAGE_BE_PASSWORD: ${{ secrets.PILOTAGE_BE_PASSWORD }}
          PILOTAGE_OHADA_PASSWORD: ${{ secrets.PILOTAGE_OHADA_PASSWORD }}
          PLAYWRIGHT_HEADLESS: true

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high
