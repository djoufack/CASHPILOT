name: Vercel Prebuilt Prod

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: vercel-prebuilt-prod
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run guards
        run: npm run guard

      - name: Run critical regression tests
        run: |
          npm run test -- \
            src/test/regression/companyScopeMissingColumnsMigration.test.js \
            src/test/regression/verifyAccountingCompanyScopeScriptContract.test.js \
            src/test/services/accountingInitService.test.js \
            src/test/regression/supabaseCompatibility.test.js

      - name: Run remote accounting compliance gate
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.VITE_SUPABASE_ANON_KEY != '' && secrets.PILOTAGE_FR_PASSWORD != '' && secrets.PILOTAGE_BE_PASSWORD != '' && secrets.PILOTAGE_OHADA_PASSWORD != '' }}
        run: npm run verify:accounting-company-scope
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          PILOTAGE_FR_PASSWORD: ${{ secrets.PILOTAGE_FR_PASSWORD }}
          PILOTAGE_BE_PASSWORD: ${{ secrets.PILOTAGE_BE_PASSWORD }}
          PILOTAGE_OHADA_PASSWORD: ${{ secrets.PILOTAGE_OHADA_PASSWORD }}

      - name: Pull Vercel project settings (production)
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build prebuilt output
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
