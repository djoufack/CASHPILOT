<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CashPilot MCP - Catalogue dynamique</title>
    <style>
      :root {
        --bg: #0f172a;
        --surface: #111827;
        --surface-2: #1f2937;
        --border: #374151;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #22d3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .hero {
        padding: 2.2rem 1.2rem;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      }

      .hero h1 {
        margin: 0;
        font-size: 2rem;
        color: var(--accent);
      }

      .hero p {
        margin: 0.6rem 0 0;
        color: var(--muted);
      }

      .stats {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.75rem;
        max-width: 760px;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.7rem;
        padding: 0.7rem;
      }

      .stat-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--accent);
      }

      .stat-label {
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
      }

      .layout {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1.2rem;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr 240px;
        gap: 0.7rem;
        margin-bottom: 1rem;
      }

      .input,
      .select {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 0.6rem;
        padding: 0.65rem 0.75rem;
      }

      .meta {
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.8rem;
      }

      .status {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 0.6rem;
        padding: 0.7rem;
        margin-bottom: 1rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 0.7rem;
      }

      .card {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 0.75rem;
        padding: 0.85rem;
      }

      .card h3 {
        margin: 0;
        color: var(--accent);
        font-size: 0.95rem;
        font-family: ui-monospace, Consolas, monospace;
      }

      .desc {
        margin: 0.45rem 0 0;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-top: 0.55rem;
      }

      .chip {
        border: 1px solid #164e63;
        color: #67e8f9;
        background: #083344;
        border-radius: 999px;
        padding: 0.08rem 0.5rem;
        font-size: 0.68rem;
      }

      .chip.secondary {
        border-color: #3f3f46;
        color: #cbd5e1;
        background: #27272a;
      }

      .section {
        margin-top: 1.2rem;
      }

      .section h2 {
        margin: 0 0 0.6rem;
        font-size: 1rem;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 0.6rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 860px;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 0.55rem 0.65rem;
        font-size: 0.82rem;
      }

      th {
        color: var(--muted);
        background: var(--surface-2);
        text-transform: uppercase;
        font-size: 0.68rem;
      }

      .mono {
        font-family: ui-monospace, Consolas, monospace;
        color: var(--accent);
      }

      .error {
        border: 1px solid #7f1d1d;
        background: #450a0a;
        color: #fca5a5;
      }

      @media (max-width: 760px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .hero h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>CashPilot MCP Tools</h1>
      <p>Catalogue dynamique charge depuis la base de donnees.</p>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="statTotal">-</div>
          <div class="stat-label">Tools actifs</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statCategories">-</div>
          <div class="stat-label">Categories</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statGenerated">-</div>
          <div class="stat-label">Generes</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statManual">-</div>
          <div class="stat-label">Manuels</div>
        </div>
      </div>
    </header>

    <main class="layout">
      <div class="toolbar">
        <input id="searchInput" class="input" placeholder="Rechercher tool, description, tags, categorie..." />
        <select id="categorySelect" class="select">
          <option value="all">Toutes categories</option>
        </select>
      </div>

      <div id="status" class="status">Chargement des tools MCP...</div>
      <div id="resultsMeta" class="meta"></div>

      <section class="section">
        <h2>Catalogue</h2>
        <div id="cards" class="grid"></div>
      </section>

      <section class="section">
        <h2>Index complet</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tool</th>
                <th>Categorie</th>
                <th>Source module</th>
                <th>Tags</th>
                <th>MAJ</th>
              </tr>
            </thead>
            <tbody id="indexBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/mcp-tools.js"></script>
  </body>
</html>
